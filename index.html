<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARRIOR ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        
        .panel { background: #111; border: 2px solid #ff1e1e; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        h2 { color: #ff1e1e; text-align: center; }
        
        /* Dashboard Rules Section */
        .rules-box { border: 1px solid #ff1e1e; padding: 15px; margin-top: 20px; background: #0a0a0a; }
        .rule { margin-bottom: 15px; color: #ccc; }
        .rule span { color: #ff1e1e; font-weight: bold; }

        input { width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff1e1e; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        #captchaCanvas { background: #222; margin: 10px 0; border: 1px solid #ff1e1e; display: block; width: 100%; }
        
        .custom-popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        .popup-content { background: #111; border: 2px solid #ff1e1e; padding: 25px; width: 80%; max-width: 280px; text-align: center; }
    </style>
</head>
<body>

<div class="panel">
    <h2>WARRIOR MODE ACTIVATED</h2>
    
    <div class="rules-box">
        <div class="rule"><span>[RULE 01]</span> DO NO WRONG.</div>
        <div class="rule"><span>[RULE 02]</span> TOLERATE NO INJUSTICE.</div>
        <div class="rule"><span>[RULE 03]</span> NO MASTURBATION / NO PORN. STICK TO DISCIPLINE.</div>
        <div class="rule"><span>[RULE 04]</span> NO DISTRACTIONS. FOCUS ONLY ON GROWTH.</div>
    </div>

    <canvas id="captchaCanvas" width="200" height="60" onclick="drawCaptcha()"></canvas>
    <input type="text" id="captchaInput" placeholder="Verification Code">
    
    <button onclick="handleProcess()">VALIDATE STREAK</button>
    <button style="background:#222; color:#ff1e1e; border:1px solid #ff1e1e;" onclick="window.open('https://wa.me/919339072785', '_blank')">CUSTOMER SUPPORT</button>
</div>

<div id="customPopup" class="custom-popup">
    <div class="popup-content">
        <p id="msgText"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
    let currentCode = "";

    function drawCaptcha() {
        const canvas = document.getElementById('captchaCanvas');
        const ctx = canvas.getContext('2d');
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        currentCode = "";
        for(let i=0; i<5; i++) currentCode += chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,200,60);
        ctx.fillStyle = "#ff1e1e"; ctx.font = "30px Orbitron";
        ctx.fillText(currentCode, 30, 40);
    }

    function showPopup(msg) {
        document.getElementById('msgText').innerText = msg;
        document.getElementById('customPopup').style.display = 'flex';
    }

    function closePopup() { document.getElementById('customPopup').style.display = 'none'; }

    function handleProcess() {
        if(document.getElementById('captchaInput').value.toUpperCase() !== currentCode) {
            showPopup("INVALID CODE - ACCESS DENIED");
            drawCaptcha();
        } else {
            showPopup("SYSTEM STREAK UPDATED SUCCESSFULLY");
        }
    }
    drawCaptcha();
</script>

</body>
</html>
